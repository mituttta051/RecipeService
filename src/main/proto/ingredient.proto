syntax = "proto3";

option java_multiple_files = true;
option java_package = "cybercooker.recipeservice.grpc";
option java_outer_classname = "IngredientProto";

message IngredientCreateRequest {
  int32 space_id = 1;
  string name = 2;
}

message IngredientId {
  int32 id = 1;
  int32 space_id = 2; 
}

message IngredientGetAllIBySpaceIdRequest {
  int32 space_id = 1;
}


message IngredientDTO {
  int32 id = 1;
  int32 space_id = 2;
  string name = 3;
}

message IngredientListDTO {
  repeated IngredientDTO ingredients = 1;
}

message Empty {}


service IngredientService {
  rpc GetIngredientById(IngredientId) returns (IngredientDTO);
  rpc GetAllIngredientsBySpaceId(IngredientGetAllIBySpaceIdRequest) returns (IngredientListDTO);
  rpc AddIngredient(IngredientCreateRequest) returns (Empty);
  rpc UpdateIngredient(IngredientDTO) returns (Empty);
  rpc DeleteIngredientById(IngredientId) returns (Empty);
}