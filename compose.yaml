services:
  recipe-db:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=recipe-db'
      - 'POSTGRES_USER=admin'
      - 'POSTGRES_PASSWORD=secret'
      - 'PGDATA=/var/lib/postgresql/data/pgdata'
    volumes:
      - ./docker-data/tasks-db:/var/lib/postgresql/data

    ports:
      - '5432:5432'